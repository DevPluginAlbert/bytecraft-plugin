name: CI - Build and Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build ByteCraft Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon --info

      - name: Upload shaded JAR
        uses: actions/upload-artifact@v4
        with:
          name: ByteCraft-${{ github.run_id }}
          path: build/libs/ByteCraft-*.jar
          retention-days: 14
